# render.yaml — Render.com Blueprint
# Deploy: Push to GitHub → Render Dashboard → New → Blueprint → Select repo

databases:
  - name: pcg-db
    plan: free
    databaseName: pcg_db
    user: pcg

services:
  # ── API Server ───────────────────────────────────────────────────────────
  - type: web
    name: pcg-api
    runtime: node
    plan: free
    buildCommand: >
      npm install --include=dev &&
      npm run -w packages/shared build &&
      cd apps/api &&
      npx prisma generate &&
      npx prisma db push --accept-data-loss &&
      cd ../.. &&
      npm run -w @pcg/api build
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: pcg-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      # IMPORTANT: After first deploy, update CORS_ORIGINS to match your actual pcg-web URL.
      # Find it in Render Dashboard → pcg-web → URL (e.g. https://pcg-web-abc123.onrender.com)
      - key: CORS_ORIGINS
        value: https://pcg-web.onrender.com
      - key: ADMIN_EMAILS
        value: admin@pcg.dev
      - key: TRUST_PROXY
        value: "1"
      - key: LOG_LEVEL
        value: warn
      - key: METRICS_WORKER_INLINE
        value: "true"
    healthCheckPath: /health
    autoDeploy: true

  # ── Next.js Frontend ─────────────────────────────────────────────────────
  - type: web
    name: pcg-web
    runtime: node
    plan: free
    buildCommand: >
      npm install --include=dev &&
      npm run -w packages/shared build &&
      npm run -w @pcg/web build
    startCommand: cd apps/web && node ../../node_modules/next/dist/bin/next start -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: NEXT_PUBLIC_API_URL
        value: https://pcg-api.onrender.com/api/v1
    autoDeploy: true
