# render.yaml — Render.com Blueprint
# Deploy: Push to GitHub → Render Dashboard → New → Blueprint → Select repo
#
# Migration strategy
# ──────────────────
# Build step:   `prisma generate`  — regenerates the Prisma client from schema.prisma.
#               This is fast, deterministic, and runs against the build image only.
#               We do NOT run `prisma migrate deploy` here because the build runner
#               cannot reliably reach the production database.
#
# Start command: `prisma migrate deploy` runs first, THEN the Node server starts.
#               This guarantees the DB schema is always in sync with the Prisma
#               client before any request is served. `migrate deploy` is idempotent
#               (already-applied migrations are skipped) so restarts are safe.
#
# Why NOT `prisma db push --accept-data-loss`?
#   - db push bypasses migration history → schema drift, no rollback story
#   - --accept-data-loss can silently DROP columns in production
#   - It is a development tool, not meant for production deployments

databases:
  - name: pcg-db
    plan: free
    databaseName: pcg_db
    user: pcg

services:
  # ── API Server ───────────────────────────────────────────────────────────────
  - type: web
    name: pcg-api
    runtime: node
    plan: free
    buildCommand: >
      npm install --include=dev &&
      npm run -w packages/shared build &&
      cd apps/api &&
      npx prisma generate &&
      cd ../.. &&
      npm run -w @pcg/api build
    startCommand: >
      cd apps/api &&
      bash scripts/migrate-deploy.sh &&
      cd ../.. &&
      node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: pcg-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      # IMPORTANT: After first deploy, update CORS_ORIGINS to match your
      # actual pcg-web URL from Render Dashboard → pcg-web → URL
      # e.g. https://pcg-web-abc123.onrender.com
      - key: CORS_ORIGINS
        value: https://pcg-web.onrender.com
      - key: ADMIN_EMAILS
        value: admin@pcg.dev
      - key: TRUST_PROXY
        value: "1"
      - key: LOG_LEVEL
        value: warn
      - key: METRICS_WORKER_INLINE
        value: "true"
    healthCheckPath: /health
    autoDeploy: true

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  - type: web
    name: pcg-web
    runtime: node
    plan: free
    buildCommand: >
      npm install --include=dev &&
      npm run -w packages/shared build &&
      npm run -w @pcg/web build
    startCommand: cd apps/web && node ../../node_modules/next/dist/bin/next start -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # NEXT_PUBLIC_API_URL is baked into the Next.js build at compile time.
      # If Render assigns a different URL (e.g. pcg-api-xxxx.onrender.com),
      # update this value AND trigger a manual redeploy of pcg-web.
      - key: NEXT_PUBLIC_API_URL
        value: https://pcg-api.onrender.com/api/v1
    autoDeploy: true
