# render.yaml — Render.com Infrastructure as Code
# Deploy: Push to GitHub → Render Dashboard → New → Blueprint → Select repo
# Render auto-detects this file and provisions all resources.
#
# ⚠️  After first deploy, set these env vars manually in the Render dashboard:
#       pcg-api → ANTHROPIC_API_KEY  (if using AI improvements feature)
#       pcg-api → ADMIN_EMAILS       (comma-separated admin email list)

databases:
  - name: pcg-db
    plan: free
    databaseName: pcg_db
    user: pcg

services:
  # ── API Server ───────────────────────────────────────────────────────────
  - type: web
    name: pcg-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: >
      npm install &&
      npm run -w packages/shared build &&
      cd apps/api &&
      npx prisma generate &&
      npx prisma migrate deploy &&
      cd ../.. &&
      npm run -w @pcg/api build
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: pcg-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: pcg-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: CORS_ORIGINS
        value: https://pcg-web.onrender.com
      - key: ADMIN_EMAILS
        value: admin@pcg.dev
      - key: TRUST_PROXY
        value: "1"
      - key: LOG_LEVEL
        value: warn
      - key: METRICS_WORKER_INLINE
        value: "true"
    healthCheckPath: /health
    autoDeploy: true

  # ── Next.js Frontend ─────────────────────────────────────────────────────
  - type: web
    name: pcg-web
    runtime: node
    plan: free
    rootDir: .
    buildCommand: >
      npm install &&
      npm run -w packages/shared build &&
      npm run -w @pcg/web build
    startCommand: >
      cp -r apps/web/public apps/web/.next/standalone/ &&
      cp -r apps/web/.next/static apps/web/.next/standalone/.next/ &&
      node apps/web/.next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NEXT_PUBLIC_API_URL
        value: https://pcg-api.onrender.com/api/v1
    autoDeploy: true
